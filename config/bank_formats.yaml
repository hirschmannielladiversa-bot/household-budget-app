# 銀行・クレジットカードCSVフォーマット定義

bank:
  mufj:
    name: "三菱UFJ銀行"
    encoding: "shift_jis"
    columns:
      date: "日付"
      description: "摘要"
      withdrawal: "お支払金額"
      deposit: "お預り金額"
      balance: "残高"
    date_format: "%Y/%m/%d"

  smbc:
    name: "三井住友銀行"
    encoding: "shift_jis"
    columns:
      date: "年月日"
      withdrawal: "お引出し"
      deposit: "お預入れ"
      balance: "残高"
      description: "摘要"
    date_format: "%Y/%m/%d"

  mizuho:
    name: "みずほ銀行"
    encoding: "shift_jis"
    columns:
      date: "日付"
      description: "摘要"
      withdrawal: "お支払金額"
      deposit: "お預入金額"
      balance: "残高"
    date_format: "%Y/%m/%d"

  rakuten:
    name: "楽天銀行"
    encoding: "utf-8"
    columns:
      date: "取引日"
      amount: "入出金(税込)"
      balance: "取引後残高"
      description: "摘要"
    date_format: "%Y/%m/%d"

  shinsei:
    name: "新生銀行"
    encoding: "utf-8-sig"
    columns:
      date: "取引日"
      description: "摘要"
      withdrawal: "出金金額"
      deposit: "入金金額"
      balance: "残高"
      memo: "メモ"
    date_format: "%Y/%m/%d"

  rokin:
    name: "ろうきん"
    encoding: "shift_jis"
    columns:
      date: "取扱日付"
      description: "摘要"
      withdrawal: "お支払金額"
      deposit: "お預り金額"
      balance: "残高"
    date_format: "%m月%d日"
    amount_prefix: "¥"
    date_no_year: true

  generic:
    name: "汎用フォーマット"
    encoding: "utf-8"
    columns:
      date: "日付"
      description: "摘要"
      amount: "金額"
      balance: "残高"
    date_format: "%Y-%m-%d"

credit_card:
  smbc_card:
    name: "三井住友カード"
    encoding: "shift_jis"
    columns:
      date: "ご利用日"
      description: "ご利用先"
      amount: "ご利用金額"
    date_format: "%Y/%m/%d"

  mufj_card:
    name: "三菱UFJニコス"
    encoding: "shift_jis"
    columns:
      date: "ご利用日"
      description: "ご利用店名"
      amount: "お支払金額"
    date_format: "%Y/%m/%d"

  amazon_card:
    name: "Amazon Mastercard"
    encoding: "utf-8"
    columns:
      date: "ご利用日"
      description: "ご利用先"
      amount: "ご利用金額"
    date_format: "%Y/%m/%d"

  generic_card:
    name: "汎用クレカ"
    encoding: "utf-8"
    columns:
      date: "日付"
      description: "店舗名"
      amount: "金額"
    date_format: "%Y-%m-%d"

securities:
  sbi:
    name: "SBI証券"
    encoding: "shift_jis"
    columns:
      date: "約定日"
      description: "銘柄名"
      amount: "受渡金額"
      balance: "預り金残高"
    date_format: "%Y/%m/%d"

  rakuten_sec:
    name: "楽天証券"
    encoding: "utf-8"
    columns:
      date: "約定日"
      description: "銘柄"
      amount: "受渡金額"
    date_format: "%Y/%m/%d"

